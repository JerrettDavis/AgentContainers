# AUTO-GENERATED — do not edit by hand.
# Stack: polyglot-devtools (Polyglot Developer Workstation)

services:
  claude-polyglot:
    image: ghcr.io/agentcontainers/fullstack-polyglot-claude:latest
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - CLAUDE_CONFIG_DIR=/home/dev/.config/claude
      - CLAUDE_WORKSPACE=/workspace
      - DEVTOOLS_ENABLED=${DEVTOOLS_ENABLED:-1}
      - HEADROOM_PROXY_URL=${HEADROOM_PROXY_URL:-http://headroom:8787}
    env_file:
      - .env
    volumes:
      - workspace:/workspace
      - claude-config:/home/dev/.config/claude
    networks:
      - agent-net
    depends_on:
      headroom:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "claude --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    user: "1000:1000"
  headroom:
    image: headroom/headroom:latest
    environment:
      - HEADROOM_HOST=${HEADROOM_HOST:-0.0.0.0}
      - HEADROOM_PORT=${HEADROOM_PORT:-8787}
      - HEADROOM_MODE=${HEADROOM_MODE:-token}
      - HEADROOM_OPTIMIZE=${HEADROOM_OPTIMIZE:-true}
      - HEADROOM_MIN_TOKENS=${HEADROOM_MIN_TOKENS:-500}
      - HEADROOM_SMART_ROUTING=${HEADROOM_SMART_ROUTING:-true}
      - HEADROOM_CACHE_ENABLED=${HEADROOM_CACHE_ENABLED:-true}
      - HEADROOM_CACHE_TTL=${HEADROOM_CACHE_TTL:-3600}
      - HEADROOM_RATE_LIMIT_ENABLED=${HEADROOM_RATE_LIMIT_ENABLED:-true}
      - HEADROOM_RPM=${HEADROOM_RPM:-60}
      - HEADROOM_TPM=${HEADROOM_TPM:-100000}
      - HEADROOM_BACKEND=${HEADROOM_BACKEND:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HEADROOM_TELEMETRY=${HEADROOM_TELEMETRY:-off}
      - HEADROOM_CODE_AWARE_ENABLED=${HEADROOM_CODE_AWARE_ENABLED:-false}
      - HEADROOM_HTTP2=${HEADROOM_HTTP2:-true}
    env_file:
      - .env
    ports:
      - "8787:8787"
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
  codex-polyglot:
    image: ghcr.io/agentcontainers/fullstack-polyglot-codex:latest
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - CODEX_HOME=/home/dev/.config/codex
      - CODEX_WORKSPACE=/workspace
      - DEVTOOLS_ENABLED=${DEVTOOLS_ENABLED:-1}
    env_file:
      - .env
    volumes:
      - workspace:/workspace
      - codex-config:/home/dev/.config/codex
    networks:
      - agent-net
    depends_on:
      headroom:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "codex --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - codex
    restart: unless-stopped
    user: "1000:1000"

networks:
  agent-net:
    driver: bridge

volumes:
  workspace:
  claude-config:
  codex-config:
  headroom-data:
