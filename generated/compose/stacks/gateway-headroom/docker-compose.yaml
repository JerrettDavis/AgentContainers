# AUTO-GENERATED — do not edit by hand.
# Stack: gateway-headroom (Gateway Stack with Headroom)

services:
  openclaw:
    image: ghcr.io/agentcontainers/node-bun-openclaw:latest
    environment:
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:?OPENCLAW_API_KEY is required}
      - OPENCLAW_PORT=3000
      - OPENCLAW_CONFIG_DIR=/home/dev/.config/openclaw
      - HEADROOM_PROXY_URL=${HEADROOM_PROXY_URL:-http://headroom:8787}
    env_file:
      - .env
    volumes:
      - workspace:/workspace
      - openclaw-config:/home/dev/.config/openclaw
    ports:
      - "${OPENCLAW_PORT:-3000}:3000"
    networks:
      - agent-net
    depends_on:
      headroom:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${OPENCLAW_PORT:-3000}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    user: "1000:1000"
  headroom:
    image: headroom/headroom:latest
    environment:
      - HEADROOM_HOST=${HEADROOM_HOST:-0.0.0.0}
      - HEADROOM_PORT=${HEADROOM_PORT:-8787}
      - HEADROOM_MODE=${HEADROOM_MODE:-token}
      - HEADROOM_OPTIMIZE=${HEADROOM_OPTIMIZE:-true}
      - HEADROOM_MIN_TOKENS=${HEADROOM_MIN_TOKENS:-500}
      - HEADROOM_SMART_ROUTING=${HEADROOM_SMART_ROUTING:-true}
      - HEADROOM_CACHE_ENABLED=${HEADROOM_CACHE_ENABLED:-true}
      - HEADROOM_CACHE_TTL=${HEADROOM_CACHE_TTL:-3600}
      - HEADROOM_RATE_LIMIT_ENABLED=${HEADROOM_RATE_LIMIT_ENABLED:-true}
      - HEADROOM_RPM=${HEADROOM_RPM:-60}
      - HEADROOM_TPM=${HEADROOM_TPM:-100000}
      - HEADROOM_BACKEND=${HEADROOM_BACKEND:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HEADROOM_TELEMETRY=${HEADROOM_TELEMETRY:-off}
    env_file:
      - .env
    ports:
      - "8787:8787"
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
  claude:
    image: ghcr.io/agentcontainers/node-bun-claude:latest
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - CLAUDE_CONFIG_DIR=/home/dev/.config/claude
      - CLAUDE_WORKSPACE=/workspace
    env_file:
      - .env
    volumes:
      - workspace:/workspace
      - claude-config:/home/dev/.config/claude
    networks:
      - agent-net
    depends_on:
      headroom:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "claude --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - claude
    restart: unless-stopped
    user: "1000:1000"

networks:
  agent-net:
    driver: bridge

volumes:
  workspace:
  openclaw-config:
  claude-config:
  headroom-data:
