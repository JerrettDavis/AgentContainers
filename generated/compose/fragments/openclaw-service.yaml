services:
  openclaw:
    image: ghcr.io/agentcontainers/ac-node-bun-openclaw:latest
    environment:
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:?OPENCLAW_API_KEY is required}
      - OPENCLAW_PORT=3000
      - OPENCLAW_CONFIG_DIR=/home/dev/.config/openclaw
    volumes:
