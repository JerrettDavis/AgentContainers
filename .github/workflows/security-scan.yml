name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'generated/docker/**'
      - 'definitions/**'
  pull_request:
    branches: [main]
    paths:
      - 'generated/docker/**'
      - 'definitions/**'
  schedule:
    - cron: '0 6 * * 1'    # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # For uploading SARIF results

jobs:
  # ─── Stage 1: Generate image list from manifests ───
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore generator
        run: dotnet restore src/AgentContainers.Generator --nologo

      - name: Build generator
        run: dotnet build src/AgentContainers.Generator --configuration Release --no-restore --nologo

      - name: Emit build matrix
        id: matrix
        run: |
          raw=$(dotnet run --project src/AgentContainers.Generator --configuration Release --no-build -- build-matrix 2>/dev/null)
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$raw" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  # ─── Stage 2: Dockerfile lint with Hadolint ───
  hadolint:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.context }}/${{ matrix.dockerfile }}
          failure-threshold: error

      - name: Write empty Hadolint SARIF
        shell: bash
        run: |
          cat > "hadolint-${{ matrix.id }}.sarif" <<'EOF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "hadolint",
                    "informationUri": "https://github.com/hadolint/hadolint",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF

      - name: Upload Hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: hadolint-${{ matrix.id }}.sarif
          category: hadolint-${{ matrix.id }}

  # ─── Stage 3: Trivy vulnerability scan on Dockerfiles ───
  trivy-config:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (Dockerfile config scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ${{ matrix.context }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Write empty Trivy config SARIF
        shell: bash
        run: |
          cat > "trivy-config-${{ matrix.id }}.sarif" <<'EOF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "trivy-config",
                    "informationUri": "https://github.com/aquasecurity/trivy",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config-${{ matrix.id }}.sarif
          category: trivy-config-${{ matrix.id }}

  # ─── Stage 4: Trivy image scan (only on schedule/manual — builds images first) ───
  trivy-image:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Prebuild local image dependencies
        shell: bash
        run: |
          set -euo pipefail
          declare -A built=()

          build_image() {
            local image_id="$1"
            local context=""
            local dockerfile=""

            if [[ -n "${built[$image_id]:-}" ]]; then
              return
            fi

            if [[ -d "generated/docker/bases/$image_id" ]]; then
              context="generated/docker/bases/$image_id"
            elif [[ -d "generated/docker/combos/$image_id" ]]; then
              context="generated/docker/combos/$image_id"
            else
              echo "No local dependency context found for agentcontainers/$image_id:latest" >&2
              return 1
            fi

            dockerfile="$context/Dockerfile"
            if [[ -f "$dockerfile" ]]; then
              while IFS= read -r dependency; do
                dependency="${dependency#agentcontainers/}"
                dependency="${dependency%:latest}"
                [[ "$dependency" == "$image_id" ]] && continue
                build_image "$dependency"
              done < <(grep -Eo 'agentcontainers/[[:alnum:]-]+:latest' "$dockerfile" | sort -u)
            fi

            docker build -t "agentcontainers/$image_id:latest" "$context"
            built[$image_id]=1
          }

          target_dockerfile="${{ matrix.context }}/${{ matrix.dockerfile }}"
          while IFS= read -r dependency; do
            dependency="${dependency#agentcontainers/}"
            dependency="${dependency%:latest}"
            build_image "$dependency"
          done < <(grep -Eo 'agentcontainers/[[:alnum:]-]+:latest' "$target_dockerfile" | sort -u)

      - name: Build image locally
        run: docker build --tag scan-target:${{ matrix.id }} --file ${{ matrix.context }}/${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Run Trivy (image vulnerability scan)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:${{ matrix.id }}
          scanners: vuln
          format: sarif
          output: trivy-image-${{ matrix.id }}.sarif
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy image SARIF
        if: ${{ always() && hashFiles(format('trivy-image-{0}.sarif', matrix.id)) != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.id }}.sarif
          category: trivy-image-${{ matrix.id }}

  # ─── Stage 5: Summary ───
  scan-summary:
    needs: [hadolint, trivy-config]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Scan summary
        run: |
          echo "## 🔒 Security Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hadolint (Dockerfile lint) | \`${{ needs.hadolint.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy (config scan) | \`${{ needs.trivy-config.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "SARIF results uploaded to GitHub Security tab." >> "$GITHUB_STEP_SUMMARY"
