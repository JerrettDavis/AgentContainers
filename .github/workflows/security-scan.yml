name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'generated/docker/**'
      - 'definitions/**'
  pull_request:
    branches: [main]
    paths:
      - 'generated/docker/**'
      - 'definitions/**'
  schedule:
    - cron: '0 6 * * 1'    # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # For uploading SARIF results

jobs:
  # ─── Stage 1: Generate image list from manifests ───
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore generator
        run: dotnet restore src/AgentContainers.Generator --nologo

      - name: Build generator
        run: dotnet build src/AgentContainers.Generator --configuration Release --no-restore --nologo

      - name: Emit build matrix
        id: matrix
        run: |
          raw=$(dotnet run --project src/AgentContainers.Generator --configuration Release --no-build -- build-matrix 2>/dev/null)
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$raw" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  # ─── Stage 2: Dockerfile lint with Hadolint ───
  hadolint:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.context }}/${{ matrix.dockerfile }}
          failure-threshold: error
          format: sarif
          output-file: hadolint-${{ matrix.id }}.sarif

      - name: Upload Hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: hadolint-${{ matrix.id }}.sarif
          category: hadolint-${{ matrix.id }}

  # ─── Stage 3: Trivy vulnerability scan on Dockerfiles ───
  trivy-config:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (Dockerfile config scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ${{ matrix.context }}
          format: sarif
          output: trivy-config-${{ matrix.id }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config-${{ matrix.id }}.sarif
          category: trivy-config-${{ matrix.id }}

  # ─── Stage 4: Trivy image scan (only on schedule/manual — builds images first) ───
  trivy-image:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Prebuild local combo dependencies
        if: matrix.type == 'combo'
        shell: bash
        run: |
          set -euo pipefail
          docker build -t agentcontainers/node-bun:latest generated/docker/bases/node-bun
          docker build -t agentcontainers/python:latest generated/docker/bases/python
          docker build -t agentcontainers/dotnet:latest generated/docker/bases/dotnet
          if grep -q 'agentcontainers/rust:latest' "${{ matrix.context }}/${{ matrix.dockerfile }}"; then
            docker build -t agentcontainers/rust:latest generated/docker/bases/rust
          fi

      - name: Build image locally
        run: docker build --tag scan-target:${{ matrix.id }} --file ${{ matrix.context }}/${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Run Trivy (image vulnerability scan)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:${{ matrix.id }}
          format: sarif
          output: trivy-image-${{ matrix.id }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.id }}.sarif
          category: trivy-image-${{ matrix.id }}

  # ─── Stage 5: Summary ───
  scan-summary:
    needs: [hadolint, trivy-config]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Scan summary
        run: |
          echo "## 🔒 Security Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hadolint (Dockerfile lint) | \`${{ needs.hadolint.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy (config scan) | \`${{ needs.trivy-config.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "SARIF results uploaded to GitHub Security tab." >> "$GITHUB_STEP_SUMMARY"
