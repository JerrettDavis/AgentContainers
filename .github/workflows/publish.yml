name: Publish Images to GHCR

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      filter:
        description: 'Comma-separated image IDs to publish (empty = all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — build but do not push'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write          # OIDC for provenance/attestation

env:
  REGISTRY: ghcr.io

jobs:
  # ─── Stage 1: Generate the build matrix from manifests ───
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      base-matrix: ${{ steps.matrix.outputs.base_matrix }}
      combo-matrix: ${{ steps.matrix.outputs.combo_matrix }}
      publish-target-matrix: ${{ steps.matrix.outputs.publish_target_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore generator
        run: dotnet restore src/AgentContainers.Generator --nologo

      - name: Build generator
        run: dotnet build src/AgentContainers.Generator --configuration Release --no-restore --nologo

      - name: Emit build matrix
        id: matrix
        run: |
          raw=$(dotnet run --project src/AgentContainers.Generator --configuration Release --no-build -- build-matrix 2>/dev/null)
          # Apply optional filter
          filter="${{ github.event.inputs.filter }}"
          if [ -n "$filter" ]; then
            raw=$(echo "$raw" | jq --arg ids "$filter" '
              .include |= [ .[] | select( .id as $id | ($ids | split(",") | map(gsub("^\\s+|\\s+$";"")) | index($id)) ) ]
            ')
          fi

          base_matrix=$(echo "$raw" | jq '{ include: [ .include[] | select(.type == "base") ] }')
          combo_matrix=$(echo "$raw" | jq '{ include: [ .include[] | select(.type == "combo") ] }')
          publish_target_matrix=$(echo "$raw" | jq '{ include: [ .include[] | select(.type == "tag-policy-image") ] }')

          echo "base_matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$base_matrix" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "combo_matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$combo_matrix" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "publish_target_matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$publish_target_matrix" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Show matrix
        run: |
          echo 'Base matrix:'
          echo '${{ steps.matrix.outputs.base_matrix }}' | jq .
          echo 'Combo matrix:'
          echo '${{ steps.matrix.outputs.combo_matrix }}' | jq .
          echo 'Publish target matrix:'
          echo '${{ steps.matrix.outputs.publish_target_matrix }}' | jq .

  # ─── Stage 2: Build + push base images ───
  build-bases:
    needs: generate-matrix
    runs-on: ubuntu-latest
    if: ${{ always() && fromJSON(needs.generate-matrix.outputs.base-matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.base-matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.id }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}

      - name: Generate SBOM with Syft
        if: github.event.inputs.dry_run != 'true'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          artifact-name: sbom-${{ matrix.id }}.spdx.json
          output-file: sbom-${{ matrix.id }}.spdx.json
          format: spdx-json

      - name: Upload SBOM artifact
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.id }}
          path: sbom-${{ matrix.id }}.spdx.json
          retention-days: 90

  # ─── Stage 3: Build + push combo images after bases ───
  build-combos:
    needs:
      - generate-matrix
      - build-bases
    runs-on: ubuntu-latest
    if: ${{ always() && fromJSON(needs.generate-matrix.outputs.combo-matrix).include[0] != null && (needs.build-bases.result == 'success' || needs.build-bases.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.combo-matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.id }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=ref,event=branch

      - name: Compute combo base image args
        id: combo_args
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version="${{ steps.meta.outputs.version }}"
          IFS='+' read -ra bases <<< "${{ matrix.family }}"
          {
            echo "args<<EOF"
            echo "PRIMARY_BASE_IMAGE=ghcr.io/${owner}/${bases[0]}:${version}"
            for base in "${bases[@]:1}"; do
              key="$(echo "$base" | tr '[:lower:]-' '[:upper:]_')_STAGE_IMAGE"
              echo "${key}=ghcr.io/${owner}/${base}:${version}"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
            ${{ steps.combo_args.outputs.args }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}

      - name: Generate SBOM with Syft
        if: github.event.inputs.dry_run != 'true'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          artifact-name: sbom-${{ matrix.id }}.spdx.json
          output-file: sbom-${{ matrix.id }}.spdx.json
          format: spdx-json

      - name: Upload SBOM artifact
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.id }}
          path: sbom-${{ matrix.id }}.spdx.json
          retention-days: 90

  # ─── Stage 4: Build + push curated publish targets after combos ───
  build-publish-targets:
    needs:
      - generate-matrix
      - build-bases
      - build-combos
    runs-on: ubuntu-latest
    if: ${{ always() && fromJSON(needs.generate-matrix.outputs.publish-target-matrix).include[0] != null && (needs.build-bases.result == 'success' || needs.build-bases.result == 'skipped') && (needs.build-combos.result == 'success' || needs.build-combos.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.publish-target-matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute publish target base image arg
        id: image_args
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            base_ref="${GITHUB_REF_NAME#v}"
          else
            base_ref="${GITHUB_REF_NAME}"
          fi
          {
            echo "args<<EOF"
            echo "BASE_IMAGE=ghcr.io/${owner}/${{ matrix.base_id }}:${base_ref}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: ${{ matrix.image_tags }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            IMAGE_VERSION=${{ matrix.release_version }}
            ${{ steps.image_args.outputs.args }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}

      - name: Generate SBOM with Syft
        if: github.event.inputs.dry_run != 'true'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.primary_tag }}
          artifact-name: sbom-${{ matrix.id }}.spdx.json
          output-file: sbom-${{ matrix.id }}.spdx.json
          format: spdx-json

      - name: Upload SBOM artifact
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.id }}
          path: sbom-${{ matrix.id }}.spdx.json
          retention-days: 90

  # ─── Stage 5: Post-publish summary ───
  publish-summary:
    needs:
      - build-bases
      - build-combos
      - build-publish-targets
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Publish summary
        run: |
          echo "## 📦 Image Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Ref** | \`${{ github.ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **SHA** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Registry** | \`${{ env.REGISTRY }}/${{ github.repository_owner }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dry Run** | \`${{ github.event.inputs.dry_run || 'false' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Base Images** | \`${{ needs.build-bases.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Combo Images** | \`${{ needs.build-combos.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Curated Publish Targets** | \`${{ needs.build-publish-targets.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
