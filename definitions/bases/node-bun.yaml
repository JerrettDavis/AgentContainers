id: node-bun
display_name: Node.js + Bun
version: v1
description: Node.js 24 LTS with Bun runtime
family: javascript

from:
  image: "node:24-bookworm-slim"

common_tools: default

provides:
  - node
  - "node>=24"
  - npm
  - bun
  - "bun>=1.0"
  - javascript

platforms:
  - linux/amd64
  - linux/arm64

install:
  steps:
    - description: "Update npm, patch npm's bundled dependencies, and install Bun"
      run: |
        npm install -g npm@11.12.1
        tmpdir=$(mktemp -d)
        npm install --prefix "$tmpdir" brace-expansion@5.0.5
        rm -rf /usr/local/lib/node_modules/npm/node_modules/brace-expansion
        cp -R "$tmpdir/node_modules/brace-expansion" /usr/local/lib/node_modules/npm/node_modules/brace-expansion
        rm -rf "$tmpdir"
        npm install --prefix /usr/local/lib/node_modules/npm/node_modules/tinyglobby picomatch@4.0.4
        npm prune --omit=dev --prefix /usr/local/lib/node_modules/npm/node_modules/node-gyp
        export BUN_INSTALL=/usr/local/bun
        mkdir -p "$BUN_INSTALL"
        curl -fsSL https://bun.sh/install | bash
        ln -sf /usr/local/bun/bin/bun /usr/local/bin/bun
        ln -sf /usr/local/bun/bin/bunx /usr/local/bin/bunx
        echo 'export BUN_INSTALL=/usr/local/bun' >> /etc/profile.d/bun.sh
        echo 'export PATH="/usr/local/bun/bin:$PATH"' >> /etc/profile.d/bun.sh

env:
  - name: NODE_ENV
    default: development
    description: Node.js environment mode
    sensitive: false
  - name: BUN_INSTALL
    default: /usr/local/bun
    description: Bun install path
    sensitive: false

mounts: []

user:
  name: dev
  uid: 1000
  gid: 1000
  sudo: true

shell: bash

healthcheck:
  test: ["CMD", "node", "--version"]
  interval: 30s
  timeout: 5s
  retries: 3

validation:
  commands:
    - "node --version"
    - "npm --version"
    - "bun --version"
    - "which git"

resource_hints:
  image_size_class: medium
  memory_minimum_mb: 512
