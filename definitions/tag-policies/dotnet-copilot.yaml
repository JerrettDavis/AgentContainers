id: dotnet-copilot
display_name: .NET-first Copilot CLI image
version: v1
description: Curated GitHub Copilot CLI image published from the dotnet/tooling point of view

runtime: node-py-dotnet
agents:
  - copilot
tool_packs:
  - devtools

release_version: 0.1.0

publish:
  - repository: ac-dotnet
    tags:
      - copilot-{{version}}
      - copilot-{{major}}.{{minor}}
      - copilot-{{major}}
      - copilot-latest
  - repository: ac-copilot
    tags:
      - dotnet10-node24-{{version}}
      - dotnet10-node24
