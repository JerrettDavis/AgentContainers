id: dotnet-claude
display_name: .NET-first Claude image
version: v1
description: Curated Claude Code image published from the dotnet/tooling point of view

runtime: node-py-dotnet
agents:
  - claude
tool_packs:
  - devtools

release_version: 0.1.0

publish:
  - repository: ac-dotnet
    tags:
      - claude-{{version}}
      - claude-{{major}}.{{minor}}
      - claude-{{major}}
      - claude-latest
  - repository: ac-claude
    tags:
      - dotnet10-node24-{{version}}
      - dotnet10-node24
